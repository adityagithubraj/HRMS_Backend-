# Render Blueprint – HRMS Backend
# Deploy: push to Git, then connect this repo in Render Dashboard or use "New > Blueprint"
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: hrms-backend
    runtime: python

    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT

    # Add these in Render Dashboard > Service > Environment (do not commit real secrets to Git)
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: hrms_lite
